<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UNCTAD ISDS Navigator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    background: #f5f5f5;
    color: #1a1a1a;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #1a3a5c;
    color: #fff;
    padding: 0 20px;
    display: flex;
    align-items: stretch;
    gap: 16px;
    min-height: 52px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; align-self: center; }

  #search-bar {
    flex: 1;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #search-bar input {
    flex: 1;
    padding: 6px 10px;
    border: none;
    border-radius: 4px;
    font-size: 14px;
  }
  #search-bar button {
    padding: 6px 14px;
    background: #4a9eda;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #search-bar button:hover { background: #357ab8; }

  /* Tab nav in header */
  #tab-nav {
    display: flex;
    align-items: stretch;
    gap: 2px;
    margin-left: 8px;
  }
  .tab-btn {
    padding: 0 16px;
    background: none;
    border: none;
    color: rgba(255,255,255,.6);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-bottom: 3px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: #fff; }
  .tab-btn.active { color: #fff; border-bottom-color: #4a9eda; }

  #layout {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* SQL panel */
  #sql-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    background: #f5f5f5;
  }
  #sql-view.visible { display: flex; }

  #sql-editor-wrap {
    padding: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #sql-input {
    width: 100%;
    height: 130px;
    font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
    font-size: 13px;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
    background: #fff;
    color: #1a1a1a;
    line-height: 1.5;
  }
  #sql-input:focus { outline: none; border-color: #4a9eda; }
  #sql-run-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #sql-run-btn {
    padding: 6px 18px;
    background: #1a3a5c;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  #sql-run-btn:hover { background: #2a5a8c; }
  #sql-status { font-size: 12px; color: #666; }
  #sql-error { font-size: 13px; color: #b91c1c; padding: 8px 16px; }
  #sql-result-wrap {
    flex: 1;
    overflow: auto;
    padding: 12px 16px;
  }
  #sql-result-wrap table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  #sql-result-wrap thead th {
    position: sticky;
    top: 0;
    background: #f0f4f8;
    border-bottom: 2px solid #ccd;
    padding: 7px 10px;
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #444;
    white-space: nowrap;
  }
  #sql-result-wrap tbody tr { border-bottom: 1px solid #eee; }
  #sql-result-wrap tbody tr:hover { background: #f7faff; }
  #sql-result-wrap td {
    padding: 6px 10px;
    font-size: 13px;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Sidebar */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    padding: 12px;
  }
  .facet-group { margin-bottom: 14px; }
  .facet-group h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #666;
    margin-bottom: 6px;
  }
  .facet-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .facet-item:hover { background: #f0f4f8; }
  .facet-item.active { background: #dbeafe; font-weight: 600; }
  .facet-item .val { flex: 1; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
  .facet-item .cnt { font-size: 11px; color: #999; flex-shrink: 0; }

  /* Main */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #results-header {
    padding: 8px 14px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #results-header .total { font-size: 13px; color: #555; }
  #pagination { display: flex; gap: 6px; align-items: center; font-size: 13px; }
  #pagination button {
    padding: 3px 10px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
  }
  #pagination button:disabled { opacity: .4; cursor: default; }
  #pagination button:hover:not(:disabled) { background: #f0f4f8; }

  #table-wrap {
    flex: 1;
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #f0f4f8;
    border-bottom: 2px solid #ccd;
    padding: 8px 10px;
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .04em;
    white-space: nowrap;
    color: #444;
  }
  tbody tr { border-bottom: 1px solid #eee; cursor: pointer; }
  tbody tr:hover { background: #f7faff; }
  td {
    padding: 7px 10px;
    vertical-align: top;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td.wrap { white-space: normal; }
  .status-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-pending   { background: #fef3c7; color: #92400e; }
  .status-decided   { background: #d1fae5; color: #065f46; }
  .status-settled   { background: #dbeafe; color: #1e40af; }
  .status-withdrawn { background: #f3f4f6; color: #6b7280; }
  .status-other     { background: #ede9fe; color: #5b21b6; }

  /* Detail panel */
  #detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    justify-content: flex-end;
  }
  #detail-overlay.open { display: flex; }
  #detail-panel {
    width: min(640px, 100vw);
    background: #fff;
    height: 100%;
    overflow-y: auto;
    padding: 20px 24px;
    position: relative;
  }
  #detail-close {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 20px;
    cursor: pointer;
    color: #666;
    border: none;
    background: none;
    line-height: 1;
  }
  #detail-close:hover { color: #000; }
  #detail-panel h2 { font-size: 16px; margin-bottom: 4px; padding-right: 28px; }
  #detail-panel .subtitle { color: #666; font-size: 13px; margin-bottom: 16px; }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
    margin-bottom: 16px;
  }
  .detail-field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #888;
    margin-bottom: 2px;
  }
  .detail-field .val { font-size: 13px; line-height: 1.4; }
  .detail-full { grid-column: 1 / -1; }
  .detail-field a { color: #1a7ac7; text-decoration: none; }
  .detail-field a:hover { text-decoration: underline; }

  #empty { padding: 40px; text-align: center; color: #999; }

  /* Enforcement status badges */
  .enf-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .enf-paid         { background: #d1fae5; color: #065f46; }
  .enf-enforced     { background: #dbeafe; color: #1e40af; }
  .enf-not_paid     { background: #fef3c7; color: #92400e; }
  .enf-blocked      { background: #fee2e2; color: #991b1b; }
  .enf-state_won    { background: #f3f4f6; color: #6b7280; }
  .enf-discontinued { background: #f3f4f6; color: #9ca3af; }
  .enf-pending      { background: #ede9fe; color: #5b21b6; }

  /* Research notes in detail panel */
  .research-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 2px solid #e5e7eb;
  }
  .research-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #666;
    margin-bottom: 12px;
  }
  .research-field { margin-bottom: 12px; }
  .research-field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #888;
    margin-bottom: 3px;
  }
  .research-field .val {
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* Enforcement proceedings timeline */
  .proceedings-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
    font-size: 13px;
  }
  .proceedings-table th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #888;
    padding: 4px 8px 6px 0;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
  }
  .proceedings-table td {
    padding: 6px 8px 6px 0;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: top;
    white-space: normal;
    max-width: none;
    overflow: visible;
    text-overflow: unset;
  }
  .proceedings-table tr:last-child td { border-bottom: none; }
  .proc-result {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .proc-enforced      { background: #d1fae5; color: #065f46; }
  .proc-dismissed     { background: #f3f4f6; color: #6b7280; }
  .proc-pending       { background: #ede9fe; color: #5b21b6; }
  .proc-set_aside     { background: #fee2e2; color: #991b1b; }
  .proc-annulled      { background: #fee2e2; color: #991b1b; }
  .proc-blocked       { background: #fee2e2; color: #991b1b; }
  .proc-appeal_pending { background: #fef3c7; color: #92400e; }

  /* Visualizations dashboard */
  #viz-view {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    background: #f5f5f5;
  }
  #viz-view.visible { display: block; }
  #viz-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  #viz-source-label {
    font-size: 13px;
    color: #555;
    flex: 1;
    min-width: 160px;
  }
  #viz-presets { display: flex; gap: 6px; }
  .viz-preset-btn {
    padding: 4px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
    color: #444;
  }
  .viz-preset-btn:hover { background: #f0f4f8; border-color: #999; }
  .viz-preset-btn.active { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
  .spain-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1300px;
  }
  .spain-card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    padding: 16px 20px;
  }
  .spain-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #666;
    margin-bottom: 14px;
  }
  .chart-wrap { position: relative; height: 280px; }
  .chart-wrap-tall { position: relative; height: 340px; }

  /* Guide tab */
  #guide-view {
    display: none;
    flex: 1;
    overflow-y: auto;
    background: #f5f5f5;
  }
  #guide-view.visible { display: block; }
  #guide-body {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 28px 48px;
    background: #fff;
    min-height: 100%;
    box-shadow: 0 0 0 1px #e5e7eb;
  }
  #guide-body h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #1a3a5c; }
  #guide-body h2 { font-size: 16px; font-weight: 700; margin: 28px 0 10px; color: #1a3a5c; border-bottom: 2px solid #e5e7eb; padding-bottom: 4px; }
  #guide-body h3 { font-size: 14px; font-weight: 700; margin: 20px 0 8px; color: #333; }
  #guide-body p  { margin: 0 0 10px; line-height: 1.65; color: #333; }
  #guide-body ul, #guide-body ol { margin: 0 0 10px 20px; line-height: 1.7; color: #333; }
  #guide-body li { margin-bottom: 3px; }
  #guide-body strong { font-weight: 600; }
  #guide-body em { font-style: italic; }
  #guide-body code {
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 12px;
    background: #f3f4f6;
    padding: 1px 5px;
    border-radius: 3px;
    color: #1a3a5c;
  }
  #guide-body pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 14px 16px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 10px 0 16px;
    font-size: 12.5px;
    line-height: 1.6;
  }
  #guide-body pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
  #guide-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 16px;
    font-size: 13px;
  }
  #guide-body th {
    background: #f0f4f8;
    text-align: left;
    padding: 6px 10px;
    border: 1px solid #dde;
    font-weight: 600;
    font-size: 12px;
  }
  #guide-body td {
    padding: 5px 10px;
    border: 1px solid #e5e7eb;
    vertical-align: top;
    white-space: normal;
    max-width: none;
    overflow: visible;
    text-overflow: unset;
  }
  #guide-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
  #guide-body a { color: #1a7ac7; text-decoration: none; }
  #guide-body a:hover { text-decoration: underline; }

  /* Workflow view */
  #workflow-view {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
    background: #f5f5f5;
  }
  #workflow-view.visible { display: flex; }

  #wf-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    background: #1a3a5c;
    color: #fff;
    min-height: 44px;
    flex-shrink: 0;
  }
  #wf-nav button {
    padding: 5px 14px;
    background: rgba(255,255,255,.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  #wf-nav button:hover:not(:disabled) { background: rgba(255,255,255,.25); }
  #wf-nav button:disabled { opacity: .4; cursor: default; }
  #wf-position { font-size: 13px; white-space: nowrap; }
  #wf-case-select {
    flex: 1;
    max-width: 340px;
    padding: 4px 8px;
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 4px;
    background: rgba(0,0,0,.25);
    color: #fff;
    font-size: 13px;
  }
  #wf-case-select option { background: #1a3a5c; }

  #wf-body {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  #wf-case-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
  }
  #wf-case-panel h2 { font-size: 18px; margin-bottom: 4px; }
  #wf-case-panel .wf-subtitle { font-size: 13px; color: #555; margin-bottom: 14px; }
  .wf-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
  }
  .wf-meta-field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #888;
    margin-bottom: 2px;
  }
  .wf-meta-field .val { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .wf-meta-full { grid-column: 1 / -1; }
  .wf-meta-field a { color: #1a7ac7; text-decoration: none; }
  .wf-meta-field a:hover { text-decoration: underline; }

  #wf-notes-panel {
    width: 360px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 16px 18px;
    background: #fafafa;
  }
  #wf-notes-panel h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: #666;
    margin-bottom: 14px;
  }
  .wf-timestamp { font-size: 11px; color: #999; }

  /* Hidden by default; toggled on mobile */
  #sidebar-overlay { display: none; }
  #cards-list { display: none; }
  #filters-btn {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: #f0f4f8;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    color: #444;
    cursor: pointer;
    flex-shrink: 0;
  }
  #filters-btn:hover { background: #e0e8f0; }

  /* === Mobile (≤600px) === */
  @media (max-width: 600px) {
    header {
      flex-wrap: wrap;
      padding: 8px 12px;
      gap: 6px;
      align-items: center;
    }
    header h1 { font-size: 15px; align-self: center; }

    #search-bar {
      order: 3;
      flex: 0 0 100%;
      padding-bottom: 4px;
    }

    #tab-nav {
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-left: 0;
      gap: 0;
    }
    #tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 0 10px; font-size: 12px; white-space: nowrap; }

    /* Sidebar → fixed off-canvas drawer */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 4px 0 24px rgba(0,0,0,.25);
    }
    #sidebar.drawer-open { transform: translateX(0); }

    /* Overlay behind drawer */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 199;
    }
    #sidebar-overlay.visible { display: block; }

    /* Filters button */
    #filters-btn { display: inline-flex; }

    /* Card list instead of table */
    #results-table { display: none; }
    #cards-list { display: block; }

    .case-card {
      border-bottom: 1px solid #eee;
      padding: 12px 14px;
      cursor: pointer;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .case-card:active { background: #f0f7ff; }
    .case-card .card-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
    }
    .case-card .card-sub { font-size: 12px; color: #666; }
    .case-card .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 2px;
    }

    /* Detail panel: full screen */
    #detail-panel { width: 100vw; padding: 16px; }
    .detail-grid { grid-template-columns: 1fr; }

    /* Charts: single column */
    .spain-grid { grid-template-columns: 1fr; }

    /* Guide: tighter padding */
    #guide-body { padding: 20px 14px 40px; }

    /* SQL: tighter */
    #sql-editor-wrap { padding: 10px 12px 0; }

    /* Workflow: stack vertically on mobile */
    #wf-body { flex-direction: column; overflow-y: auto; }
    #wf-case-panel { border-right: none; border-bottom: 1px solid #e0e0e0; overflow-y: visible; }
    #wf-notes-panel { width: 100%; overflow-y: visible; }
    #wf-case-select { max-width: 160px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>

<header>
  <h1>ISDS Navigator</h1>
  <div id="search-bar">
    <input id="q" type="search" placeholder="Full-text search cases, parties, treaties…" autocomplete="off">
    <button onclick="search(1)">Search</button>
  </div>
  <nav id="tab-nav">
    <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')">Browse</button>
    <button class="tab-btn" data-tab="sql" onclick="switchTab('sql')">SQL</button>
    <button class="tab-btn" data-tab="viz" onclick="switchTab('viz')">Visualizations</button>
    <button class="tab-btn" data-tab="guide" onclick="switchTab('guide')">Guide</button>
    <button class="tab-btn" data-tab="workflow" onclick="switchTab('workflow')">Case Browser</button>
  </nav>
</header>

<div id="layout">
  <aside id="sidebar">
    <div id="facets-container"></div>
  </aside>

  <div id="main">
    <div id="results-header">
      <button id="filters-btn" onclick="toggleSidebar()">&#9776; Filters</button>
      <span class="total" id="total-label">Loading…</span>
      <div id="pagination">
        <button id="prev-btn" onclick="goPage(-1)" disabled>&#8592; Prev</button>
        <span id="page-label"></span>
        <button id="next-btn" onclick="goPage(1)" disabled>Next &#8594;</button>
      </div>
    </div>

    <div id="table-wrap">
      <table id="results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Year</th>
            <th>Short Name</th>
            <th>Respondent</th>
            <th>Home State</th>
            <th>Applicable IIA</th>
            <th>Status</th>
            <th>Enforcement</th>
            <th>Sector</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div id="cards-list"></div>
      <div id="empty" style="display:none">No results found.</div>
    </div>
  </div>

  <div id="viz-view">
    <div id="viz-controls">
      <div id="viz-source-label">Showing: <strong id="viz-source-text">loading…</strong></div>
      <div id="viz-presets">
        <button class="viz-preset-btn" id="preset-browse" onclick="loadVizPreset('browse')">Current Browse</button>
        <button class="viz-preset-btn" id="preset-spain" onclick="loadVizPreset('spain')">Spain</button>
        <button class="viz-preset-btn" id="preset-all" onclick="loadVizPreset('all')">All Cases</button>
      </div>
    </div>
    <div class="spain-grid">
      <div class="spain-card">
        <h3>Case Outcomes</h3>
        <div class="chart-wrap"><canvas id="chart-outcomes"></canvas></div>
      </div>
      <div class="spain-card">
        <h3>Investors' Countries of Origin</h3>
        <div class="chart-wrap-tall"><canvas id="chart-homestates"></canvas></div>
      </div>
      <div class="spain-card">
        <h3>Cases Filed per Year</h3>
        <div class="chart-wrap"><canvas id="chart-byyear"></canvas></div>
      </div>
      <div class="spain-card">
        <h3>Compensation Claimed vs. Awarded (USD millions)</h3>
        <div class="chart-wrap"><canvas id="chart-amounts"></canvas></div>
      </div>
    </div>
  </div>

  <div id="guide-view">
    <div id="guide-body">Loading…</div>
  </div>

  <div id="workflow-view">
    <div id="wf-nav">
      <button id="wf-prev" onclick="wfGo(-1)">← Prev</button>
      <span id="wf-position"></span>
      <select id="wf-case-select" onchange="wfJump(this.value)"></select>
      <button id="wf-next" onclick="wfGo(1)">Next →</button>
    </div>
    <div id="wf-body">
      <div id="wf-case-panel">
        <div id="wf-case-info">Loading…</div>
      </div>
      <div id="wf-notes-panel">
        <div id="wf-notes-content"></div>
      </div>
    </div>
  </div>

  <div id="sql-view">
    <div id="sql-editor-wrap">
      <textarea id="sql-input" spellcheck="false" placeholder="SELECT * FROM cases LIMIT 10"></textarea>
      <div id="sql-run-row">
        <button id="sql-run-btn" onclick="runSql()">Run &#9654;</button>
        <span id="sql-status"></span>
      </div>
      <div id="sql-error"></div>
    </div>
    <div id="sql-result-wrap"></div>
  </div>
</div>

<div id="sidebar-overlay"></div>

<div id="detail-overlay">
  <div id="detail-panel">
    <button id="detail-close" onclick="closeDetail()">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const state = { q: "", filters: {}, page: 1 };

const ENF_LABELS = {
  paid:         "Paid",
  enforced:     "Enforced (unpaid)",
  not_paid:     "Award unpaid",
  blocked:      "Blocked / set aside",
  state_won:    "State prevailed",
  discontinued: "Discontinued",
  pending:      "Pending",
};

function enfBadge(status) {
  if (!status) return "";
  const label = ENF_LABELS[status] ?? status;
  return `<span class="enf-badge enf-${status}">${esc(label)}</span>`;
}

function statusClass(s) {
  if (!s) return "status-other";
  const l = s.toLowerCase();
  if (l.includes("pending")) return "status-pending";
  if (l.includes("decided") || l.includes("award") || l.includes("discontin")) return "status-decided";
  if (l.includes("settled")) return "status-settled";
  if (l.includes("withdrawn") || l.includes("discontinued")) return "status-withdrawn";
  return "status-other";
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s ?? "";
  return d.innerHTML;
}

async function search(page = 1) {
  state.q = document.getElementById("q").value.trim();
  state.page = page;
  const params = new URLSearchParams({ q: state.q, page });
  for (const [k, v] of Object.entries(state.filters)) if (v) params.set(k, v);

  const res = await fetch("/api/search?" + params);
  const data = await res.json();
  renderResults(data);
  updateVizFromBrowse();
}

function renderResults({ total, page, per_page, rows }) {
  const pages = Math.ceil(total / per_page);
  document.getElementById("total-label").textContent =
    `${total.toLocaleString()} cases`;
  document.getElementById("page-label").textContent = `${page} / ${pages || 1}`;
  document.getElementById("prev-btn").disabled = page <= 1;
  document.getElementById("next-btn").disabled = page >= pages;

  const tbody = document.getElementById("results-body");
  const empty = document.getElementById("empty");

  if (!rows.length) {
    tbody.innerHTML = "";
    renderCards([]);
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = rows.map(r => `
    <tr onclick="showDetail(${r.no})">
      <td>${r.no}</td>
      <td>${r.year ?? ""}</td>
      <td title="${esc(r.full_name)}">${esc(r.short_name)}</td>
      <td>${esc(r.respondent_state)}</td>
      <td>${esc(r.home_state)}</td>
      <td title="${esc(r.applicable_iia)}">${esc(r.applicable_iia)}</td>
      <td><span class="status-badge ${statusClass(r.status)}">${esc(r.status)}</span></td>
      <td>${enfBadge(r.enforcement_status)}</td>
      <td>${esc(r.sector)}</td>
    </tr>
  `).join("");
  renderCards(rows);
}

function renderCards(rows) {
  const list = document.getElementById("cards-list");
  if (!rows.length) { list.innerHTML = ""; return; }
  list.innerHTML = rows.map(r => `
    <div class="case-card" onclick="showDetail(${r.no})">
      <div class="card-name">${esc(r.short_name)}</div>
      <div class="card-sub">${r.year ?? ""} · ${esc(r.respondent_state)}${r.home_state ? " ← " + esc(r.home_state) : ""}</div>
      <div class="card-badges">
        <span class="status-badge ${statusClass(r.status)}">${esc(r.status)}</span>
        ${enfBadge(r.enforcement_status)}
      </div>
    </div>
  `).join("");
}

function goPage(delta) {
  search(state.page + delta);
}

// --- Facets ---

async function loadFacets() {
  const res = await fetch("/api/facets");
  const data = await res.json();
  renderFacets(data);
}

const FACET_LABELS = {
  year: "Year",
  status: "Status",
  respondent_state: "Respondent State",
  home_state: "Home State",
  sector: "Sector",
  arbitral_rules: "Arbitral Rules",
  institution: "Institution",
};

// Enforcement facet is fetched separately and rendered after UNCTAD facets
let enforcementIndex = {};   // case_no (string) → enforcement_status

async function loadEnforcementIndex() {
  const res = await fetch("/api/research");
  enforcementIndex = await res.json();
  renderEnforcementFacet();
}

function renderEnforcementFacet() {
  const counts = {};
  for (const status of Object.values(enforcementIndex)) {
    counts[status] = (counts[status] ?? 0) + 1;
  }
  const container = document.getElementById("facets-container");
  const group = document.createElement("div");
  group.id = "enf-facet-group";
  group.className = "facet-group";
  group.innerHTML = `<h3>Enforcement</h3>`;

  const ORDER = ["enforced","not_paid","blocked","paid","state_won","discontinued","pending"];
  ORDER.forEach(status => {
    if (!counts[status]) return;
    const el = document.createElement("div");
    el.className = "facet-item" + (state.filters["enforcement_status"] === status ? " active" : "");
    el.innerHTML = `<span class="val">${enfBadge(status)}</span><span class="cnt">${counts[status]}</span>`;
    el.onclick = () => {
      if (state.filters["enforcement_status"] === status) {
        delete state.filters["enforcement_status"];
      } else {
        state.filters["enforcement_status"] = status;
      }
      group.querySelectorAll(".facet-item").forEach(e => e.classList.remove("active"));
      if (state.filters["enforcement_status"]) el.classList.add("active");
      search(1);
    };
    group.appendChild(el);
  });

  // Insert before the first existing facet group
  const first = container.firstChild;
  if (first) container.insertBefore(group, first);
  else container.appendChild(group);
}

function renderFacets(data) {
  const container = document.getElementById("facets-container");
  container.innerHTML = "";

  for (const [col, items] of Object.entries(data)) {
    if (!items.length) continue;
    const group = document.createElement("div");
    group.className = "facet-group";
    group.innerHTML = `<h3>${FACET_LABELS[col] ?? col}</h3>`;

    items.slice(0, 20).forEach(({ value, count }) => {
      const el = document.createElement("div");
      el.className = "facet-item" + (state.filters[col] === value ? " active" : "");
      el.title = value;
      el.innerHTML = `<span class="val">${esc(value)}</span><span class="cnt">${count}</span>`;
      el.onclick = () => {
        if (state.filters[col] === value) {
          delete state.filters[col];
        } else {
          state.filters[col] = value;
        }
        // Re-render active state
        group.querySelectorAll(".facet-item").forEach(e => e.classList.remove("active"));
        if (state.filters[col]) el.classList.add("active");
        search(1);
      };
      group.appendChild(el);
    });

    container.appendChild(group);
  }
}

// --- Detail panel ---

function field(label, value, full = false) {
  if (!value) return "";
  return `
    <div class="detail-field${full ? " detail-full" : ""}">
      <label>${label}</label>
      <div class="val">${esc(value)}</div>
    </div>`;
}

function linkField(label, value) {
  if (!value) return "";
  const links = value.split(/[\n;]+/).map(u => u.trim()).filter(Boolean);
  return `
    <div class="detail-field detail-full">
      <label>${label}</label>
      <div class="val">${links.map(u => `<a href="${esc(u)}" target="_blank">${esc(u)}</a>`).join("<br>")}</div>
    </div>`;
}

async function showDetail(no) {
  const res = await fetch(`/api/case?no=${no}`);
  const r = await res.json();

  const PROC_LABELS = {
    enforced:       "Enforced",
    dismissed:      "Dismissed",
    pending:        "Pending",
    set_aside:      "Set aside",
    annulled:       "Annulled",
    blocked:        "Blocked",
    appeal_pending: "Appeal pending",
  };

  const procHtml = r.proceedings && r.proceedings.length ? `
    <div class="research-section">
      <h3>Enforcement Proceedings</h3>
      <table class="proceedings-table">
        <thead><tr><th>Forum</th><th>Result</th><th>Date</th><th>Notes</th></tr></thead>
        <tbody>
          ${r.proceedings.map(p => `
            <tr>
              <td>${esc(p.forum)}</td>
              <td><span class="proc-result proc-${p.result}">${esc(PROC_LABELS[p.result] ?? p.result)}</span></td>
              <td style="white-space:nowrap;color:#666">${esc(p.date_text ?? "")}</td>
              <td style="color:#444">${esc(p.notes ?? "")}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>` : "";

  const researchHtml = r.enforcement_status ? `
    <div class="research-section">
      <h3>Research Notes</h3>
      <div class="research-field">
        <label>Enforcement Status</label>
        <div class="val">${enfBadge(r.enforcement_status)}</div>
      </div>
      ${r.enforcement_detail ? `<div class="research-field"><label>Enforcement Detail</label><div class="val">${esc(r.enforcement_detail)}</div></div>` : ""}
      ${r.context          ? `<div class="research-field"><label>Context</label><div class="val">${esc(r.context)}</div></div>` : ""}
      ${r.claim_basis      ? `<div class="research-field"><label>Claim Basis</label><div class="val">${esc(r.claim_basis)}</div></div>` : ""}
      ${r.significance     ? `<div class="research-field"><label>Significance</label><div class="val">${esc(r.significance)}</div></div>` : ""}
    </div>` : "";

  document.getElementById("detail-content").innerHTML = `
    <h2>${esc(r.short_name)}</h2>
    <div class="subtitle">${esc(r.full_name)}</div>

    <div class="detail-grid">
      ${field("Case No.", r.no)}
      ${field("Year", r.year)}
      ${field("Status", r.status)}
      ${field("Respondent State", r.respondent_state)}
      ${field("Home State of Investor", r.home_state)}
      ${field("Applicable IIA", r.applicable_iia, true)}
      ${field("Arbitral Rules", r.arbitral_rules)}
      ${field("Institution", r.institution)}
      ${field("Sector", r.sector)}
      ${field("Subsector", r.subsector)}
      ${field("Amount Claimed (M)", r.amount_claimed_m)}
      ${field("Amount Awarded (M)", r.amount_awarded_m)}
      ${field("IIA Breaches Alleged", r.breaches_alleged, true)}
      ${field("IIA Breaches Found", r.breaches_found, true)}
      ${field("Arbitrators", r.arbitrators, true)}
      ${field("Decisions", r.decisions, true)}
      ${field("Individual Opinions", r.individual_opinions, true)}
      ${field("Follow-on Type", r.followon_type)}
      ${field("Follow-on Status", r.followon_status)}
      ${field("Follow-on Decisions", r.followon_decisions, true)}
      ${field("Annulment Committee", r.annulment_committee, true)}
      ${field("Summary", r.summary, true)}
      ${field("Investment Details", r.investment_details, true)}
      ${linkField("Italaw Link", r.italaw_link)}
      ${linkField("Background Sources", r.background_sources)}
    </div>
    ${procHtml}
    ${researchHtml}
  `;

  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

document.getElementById("detail-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("detail-overlay")) closeDetail();
});

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  const opening = !sidebar.classList.contains("drawer-open");
  sidebar.classList.toggle("drawer-open", opening);
  overlay.classList.toggle("visible", opening);
}

document.getElementById("sidebar-overlay").addEventListener("click", () => {
  document.getElementById("sidebar").classList.remove("drawer-open");
  document.getElementById("sidebar-overlay").classList.remove("visible");
});

document.getElementById("q").addEventListener("keydown", e => {
  if (e.key === "Enter") search(1);
});

// --- Tab switching ---

function switchTab(tab) {
  const isBrowse   = tab === "browse";
  const isSql      = tab === "sql";
  const isViz      = tab === "viz";
  const isGuide    = tab === "guide";
  const isWorkflow = tab === "workflow";
  document.getElementById("sidebar").style.display       = isBrowse ? "" : "none";
  document.getElementById("main").style.display          = isBrowse ? "" : "none";
  document.getElementById("sql-view").classList.toggle("visible", isSql);
  document.getElementById("viz-view").classList.toggle("visible", isViz);
  document.getElementById("guide-view").classList.toggle("visible", isGuide);
  document.getElementById("workflow-view").classList.toggle("visible", isWorkflow);
  document.getElementById("search-bar").style.visibility = isBrowse ? "" : "hidden";
  document.querySelectorAll(".tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab)
  );
  if (isSql) {
    if (!sqlUserEdited) document.getElementById("sql-input").value = buildBrowseSql();
    document.getElementById("sql-input").focus();
  }
  if (isViz) renderViz();
  if (isGuide) loadGuide();
  if (isWorkflow) loadWorkflow();
}

let guideLoaded = false;
async function loadGuide() {
  if (guideLoaded) return;
  const res = await fetch("/GUIDE.md");
  const md = await res.text();
  document.getElementById("guide-body").innerHTML = marked.parse(md);
  guideLoaded = true;
}

// --- Visualizations ---

let vizRows = [];
let vizLabel = "";
let vizActivePreset = "browse";
const vizCharts = {};

function destroyVizCharts() {
  for (const c of Object.values(vizCharts)) {
    try { c.destroy(); } catch (_) {}
  }
  Object.keys(vizCharts).forEach(k => delete vizCharts[k]);
}

function parseUSD(s) {
  if (!s || s.includes("Data not available")) return null;
  let m = s.match(/\((\d+(?:\.\d+)?)\s+USD\)/);
  if (m) return parseFloat(m[1]);
  m = s.match(/^(\d+(?:\.\d+)?)\s+USD/);
  return m ? parseFloat(m[1]) : null;
}

function splitHomeStates(s) {
  if (!s) return [];
  return s.split(/[;\n]+/).map(x => x.trim()).filter(Boolean);
}

function aggregateForViz(rows) {
  const outcomeCounts = {};
  for (const r of rows) {
    const s = r.status || "Unknown";
    outcomeCounts[s] = (outcomeCounts[s] || 0) + 1;
  }
  const outcomes = Object.entries(outcomeCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([label, count]) => ({ label, count }));

  const stateCounts = {};
  for (const r of rows) {
    for (const c of splitHomeStates(r.home_state)) {
      stateCounts[c] = (stateCounts[c] || 0) + 1;
    }
  }
  const homeStates = Object.entries(stateCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([country, count]) => ({ country, count }));

  const OUTCOME_KEY = {
    "Decided in favour of investor": "investor",
    "Decided in favour of State":    "state",
    "Pending":                        "pending",
    "Discontinued for unknown reasons": "discontinued",
  };
  const yearsMap = {};
  for (const r of rows) {
    if (!r.year) continue;
    if (!yearsMap[r.year]) yearsMap[r.year] = { year: r.year, investor: 0, state: 0, pending: 0, discontinued: 0 };
    yearsMap[r.year][OUTCOME_KEY[r.status] || "investor"]++;
  }
  const byYear = Object.values(yearsMap).sort((a, b) => a.year - b.year);

  const amounts = rows
    .map(r => ({
      no: r.no, name: r.short_name,
      claimed_usd: parseUSD(r.amount_claimed_m),
      awarded_usd: parseUSD(r.amount_awarded_m),
      status: r.status, year: r.year,
      enforcement_status: r.enforcement_status ?? null,
    }))
    .filter(a => a.claimed_usd !== null)
    .sort((a, b) => (b.claimed_usd || 0) - (a.claimed_usd || 0));

  return { total: rows.length, outcomes, homeStates, byYear, amounts };
}

function renderViz() {
  if (!vizRows.length) return;
  destroyVizCharts();
  const agg = aggregateForViz(vizRows);
  document.getElementById("viz-source-text").textContent = vizLabel;
  // Update preset button active state
  document.querySelectorAll(".viz-preset-btn").forEach(b => b.classList.remove("active"));
  const activeBtn = document.getElementById("preset-" + vizActivePreset);
  if (activeBtn) activeBtn.classList.add("active");
  renderOutcomes(agg.outcomes);
  renderHomeStates(agg.homeStates);
  renderByYear(agg.byYear);
  renderAmounts(agg.amounts);
}

async function loadVizPreset(preset) {
  vizActivePreset = preset;
  if (preset === "spain") {
    const res = await fetch("/api/search?respondent_state=Spain&all=1");
    const data = await res.json();
    vizRows = data.rows;
    vizLabel = `Spain cases (${data.total})`;
  } else if (preset === "all") {
    const res = await fetch("/api/search?all=1");
    const data = await res.json();
    vizRows = data.rows;
    vizLabel = `All cases (${data.total})`;
  } else if (preset === "browse") {
    // Re-fetch current browse params
    await updateVizFromBrowse();
  }
  renderViz();
}

async function updateVizFromBrowse() {
  vizActivePreset = "browse";
  const params = new URLSearchParams({ q: state.q, all: "1" });
  for (const [k, v] of Object.entries(state.filters)) if (v) params.set(k, v);
  const res = await fetch("/api/search?" + params);
  const data = await res.json();
  vizRows = data.rows;
  const parts = [];
  if (state.q) parts.push(`"${state.q}"`);
  if (state.filters.respondent_state) parts.push(state.filters.respondent_state);
  if (state.filters.enforcement_status) parts.push(ENF_LABELS[state.filters.enforcement_status] ?? state.filters.enforcement_status);
  vizLabel = parts.length
    ? `Browse: ${parts.join(", ")} (${data.total})`
    : `Browse: All Cases (${data.total})`;
  if (document.getElementById("viz-view").classList.contains("visible")) renderViz();
}

function isCaseData(columns) {
  return columns.includes("status") && columns.includes("year");
}

const OUTCOME_COLORS = {
  "Decided in favour of investor":        "#10b981",
  "Decided in favour of State":           "#ef4444",
  "Pending":                              "#f59e0b",
  "Discontinued for unknown reasons":     "#9ca3af",
};

const ENF_COLORS = {
  paid:         "#10b981",
  enforced:     "#3b82f6",
  not_paid:     "#f59e0b",
  blocked:      "#ef4444",
  state_won:    "#9ca3af",
  discontinued: "#d1d5db",
  pending:      "#8b5cf6",
};
const ENF_ORDER = ["enforced", "not_paid", "blocked", "paid", "state_won", "pending", "discontinued"];

function renderOutcomes(outcomes) {
  vizCharts.outcomes = new Chart(document.getElementById("chart-outcomes"), {
    type: "doughnut",
    data: {
      labels: outcomes.map(o => o.label),
      datasets: [{
        data: outcomes.map(o => o.count),
        backgroundColor: outcomes.map(o => OUTCOME_COLORS[o.label] ?? "#c4b5fd"),
        borderWidth: 2,
        borderColor: "#fff",
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "right",
          labels: { font: { size: 12 }, padding: 14, boxWidth: 14 },
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw} cases`,
          },
        },
      },
    },
  });
}

function renderHomeStates(homeStates) {
  const top = homeStates.slice(0, 14);
  vizCharts.homeStates = new Chart(document.getElementById("chart-homestates"), {
    type: "bar",
    data: {
      labels: top.map(s => s.country),
      datasets: [{
        data:  top.map(s => s.count),
        backgroundColor: "#4a9eda",
        borderRadius: 3,
      }],
    },
    options: {
      indexAxis: "y",
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 } },
        y: { ticks: { font: { size: 12 } } },
      },
    },
  });
}

function renderByYear(byYear) {
  vizCharts.byYear = new Chart(document.getElementById("chart-byyear"), {
    type: "bar",
    data: {
      labels: byYear.map(y => y.year),
      datasets: [
        { label: "Investor wins",  data: byYear.map(y => y.investor),     backgroundColor: "#10b981", stack: "a" },
        { label: "State wins",     data: byYear.map(y => y.state),        backgroundColor: "#ef4444", stack: "a" },
        { label: "Pending",        data: byYear.map(y => y.pending),      backgroundColor: "#f59e0b", stack: "a" },

      maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12, padding: 10 } } },

        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } },
      },

function renderAmounts(amounts) {
  const maxClaim = Math.max(...amounts.map(a => a.claimed_usd), 100);
  const withAward = amounts.filter(a => a.awarded_usd !== null);
  const maxAward = withAward.length ? Math.max(...withAward.map(a => a.awarded_usd), 100) : 100;
  const yMax = Math.ceil(maxAward * 1.3 / 50) * 50;

  // Group by enforcement_status; cases with no research data go into "other"
  const groups = {};
  for (const a of amounts) {
    const key = a.enforcement_status ?? "other";
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }

  const orderedKeys = [
    ...ENF_ORDER.filter(k => groups[k]),
    ...Object.keys(groups).filter(k => !ENF_ORDER.includes(k) && k !== "other"),
    ...(groups["other"] ? ["other"] : []),
  ];

  const datasets = orderedKeys.map(key => ({
    label: ENF_LABELS[key] ?? (key === "other" ? "No data" : key),
    data: groups[key].map(a => ({
      x: a.claimed_usd,
      y: a.awarded_usd ?? 0,
      name: a.name,
      noAward: a.awarded_usd === null,
    })),
    backgroundColor: ENF_COLORS[key] ?? "#aaa",
    pointRadius: 5,
    pointHoverRadius: 7,
  }));

  datasets.push({
    label: "Claimed = Awarded (ref.)",
    type: "line",
    data: [{ x: 0, y: 0 }, { x: maxClaim, y: maxClaim }],
    borderColor: "rgba(0,0,0,.15)",
    borderDash: [6, 4],
    pointRadius: 0,
    fill: false,
    tension: 0,
  });

  vizCharts.amounts = new Chart(document.getElementById("chart-amounts"), {
    type: "scatter",
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d = ctx.raw;
              if (!d.name) return "";
              if (d.noAward) return ` ${d.name}: claimed ${d.x}M (no award yet)`;
              return ` ${d.name}: claimed ${d.x}M → awarded ${d.y}M`;
            },
          },
          filter: item => !!item.raw.name,
        },
      },
      scales: {
        x: { beginAtZero: true, title: { display: true, text: "Claimed (USD M)", font: { size: 11 } } },
        y: { beginAtZero: true, max: yMax, title: { display: true, text: "Awarded (USD M)", font: { size: 11 } } },
      },
    },
  });
}

// --- Case Browser ---

let wfCases = [];
let wfIndex = 0;

async function loadWorkflow() {
  if (wfCases.length) { renderWfCase(); return; }
  document.getElementById("wf-case-info").textContent = "Loading…";
  const res = await fetch("/api/workflow");
  wfCases = await res.json();
  const sel = document.getElementById("wf-case-select");
  sel.innerHTML = wfCases.map((c, i) =>
    `<option value="${i}">${esc(c.short_name)} (${c.year ?? "?"})</option>`
  ).join("");
  renderWfCase();
}

function wfGo(delta) {
  wfIndex = Math.max(0, Math.min(wfCases.length - 1, wfIndex + delta));
  renderWfCase();
}

function wfJump(val) {
  wfIndex = parseInt(val, 10);
  renderWfCase();
}

function wfMetaField(label, value, full) {
  if (!value) return "";
  return `<div class="wf-meta-field${full ? " wf-meta-full" : ""}">
    <label>${label}</label><div class="val">${esc(value)}</div>
  </div>`;
}

function renderWfCase() {
  const c = wfCases[wfIndex];
  document.getElementById("wf-position").textContent = `${wfIndex + 1} / ${wfCases.length}`;
  document.getElementById("wf-prev").disabled = wfIndex === 0;
  document.getElementById("wf-next").disabled = wfIndex === wfCases.length - 1;
  document.getElementById("wf-case-select").value = wfIndex;

  const italaw = c.italaw_link
    ? `<div class="wf-meta-field wf-meta-full"><label>Italaw</label><div class="val"><a href="${esc(c.italaw_link)}" target="_blank">${esc(c.italaw_link)}</a></div></div>`
    : "";
  document.getElementById("wf-case-info").innerHTML = `
    <h2>${esc(c.short_name)}</h2>
    <div class="wf-subtitle">${esc(c.full_name)}</div>
    <div class="wf-meta">
      ${wfMetaField("Year", c.year)}
      ${wfMetaField("Status", c.status)}
      ${wfMetaField("Applicable IIA", c.applicable_iia, true)}
      ${wfMetaField("Sector", c.sector)}
      ${wfMetaField("Amount Claimed", c.amount_claimed_m)}
      ${wfMetaField("Amount Awarded", c.amount_awarded_m)}
      ${wfMetaField("Summary", c.summary, true)}
      ${wfMetaField("Investment Details", c.investment_details, true)}
      ${italaw}
    </div>
  `;

  const noteFields = [
    c.enforcement_status ? `<div class="research-field"><label>Enforcement Status</label><div class="val">${enfBadge(c.enforcement_status)}</div></div>` : "",
    c.enforcement_detail ? `<div class="research-field"><label>Enforcement Detail</label><div class="val">${esc(c.enforcement_detail)}</div></div>` : "",
    c.context            ? `<div class="research-field"><label>Context</label><div class="val">${esc(c.context)}</div></div>` : "",
    c.claim_basis        ? `<div class="research-field"><label>Claim Basis</label><div class="val">${esc(c.claim_basis)}</div></div>` : "",
    c.significance       ? `<div class="research-field"><label>Significance</label><div class="val">${esc(c.significance)}</div></div>` : "",
  ].filter(Boolean).join("");

  document.getElementById("wf-notes-content").innerHTML = noteFields
    ? `<div class="research-section"><h3>Research Notes</h3>${noteFields}${
        c.research_updated_at
          ? `<div class="wf-timestamp" style="margin-top:10px">Updated ${c.research_updated_at.slice(0,10)}</div>`
          : ""
      }</div>`
    : `<div style="color:#999;font-size:13px;padding:16px 0">No research notes for this case.</div>`;
}

// Arrow-key navigation in Case Browser
document.addEventListener("keydown", e => {
  if (!document.getElementById("workflow-view").classList.contains("visible")) return;
  const tag = document.activeElement?.tagName;
  if (tag === "TEXTAREA" || tag === "INPUT" || tag === "SELECT") return;
  if (e.key === "ArrowLeft")  { e.preventDefault(); wfGo(-1); }
  if (e.key === "ArrowRight") { e.preventDefault(); wfGo(1); }
});

// --- SQL ---

function sqlLiteral(s) {
  return "'" + String(s).replace(/'/g, "''") + "'";
}

function buildBrowseSql() {
  const clauses = [];

  if (state.q) {
    clauses.push(
      `(cases.no IN (SELECT rowid FROM cases_fts WHERE cases_fts MATCH ${sqlLiteral(state.q)})\n` +
      `  OR cases.no IN (SELECT rowid FROM research_notes_fts WHERE research_notes_fts MATCH ${sqlLiteral(state.q)}))`
    );
  }

  for (const [k, v] of Object.entries(state.filters)) {
    if (!v) continue;
    if (k === "enforcement_status") {
      clauses.push(`rn.enforcement_status = ${sqlLiteral(v)}`);
    } else {
      clauses.push(`cases.${k} = ${sqlLiteral(v)}`);
    }
  }

  const where = clauses.length
    ? "\nWHERE " + clauses.join("\n  AND ")
    : "";

  return (
    "SELECT cases.*, rn.enforcement_status, rn.context, rn.claim_basis\n" +
    "FROM cases LEFT JOIN research_notes rn ON cases.no = rn.case_no" +
    where +
    "\nORDER BY cases.year DESC, cases.no ASC\nLIMIT 50"
  );
}

let sqlUserEdited = false;

document.getElementById("sql-input").addEventListener("input", () => {
  sqlUserEdited = true;
});

async function runSql() {
  const sql = document.getElementById("sql-input").value.trim();
  if (!sql) return;
  const statusEl = document.getElementById("sql-status");
  const errorEl  = document.getElementById("sql-error");
  const resultEl = document.getElementById("sql-result-wrap");
  statusEl.textContent = "Running…";
  errorEl.textContent = "";
  resultEl.innerHTML = "";

  const t0 = performance.now();
  const res = await fetch("/api/sql", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql }),
  });
  const data = await res.json();
  const ms = (performance.now() - t0).toFixed(0);

  if (data.error) {
    errorEl.textContent = data.error;
    statusEl.textContent = "";
    return;
  }

  statusEl.textContent = `${data.count} row${data.count !== 1 ? "s" : ""} · ${ms}ms`;

  if (isCaseData(data.columns)) {
    vizRows = data.rows.map(row => {
      const obj = {};
      data.columns.forEach((col, i) => obj[col] = row[i]);
      return obj;
    });
    vizLabel = `SQL results (${data.count} rows)`;
    vizActivePreset = "browse"; // clear preset highlight
    if (document.getElementById("viz-view").classList.contains("visible")) renderViz();
  }

  if (!data.rows.length) {
    resultEl.innerHTML = "<div style='padding:20px;color:#999'>No rows returned.</div>";
    return;
  }

  const thead = `<thead><tr>${data.columns.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead>`;
  const tbody = `<tbody>${data.rows.map(row =>
    `<tr>${row.map(v => `<td title="${esc(String(v ?? ""))}">${esc(String(v ?? ""))}</td>`).join("")}</tr>`
  ).join("")}</tbody>`;
  resultEl.innerHTML = `<table>${thead}${tbody}</table>`;
}

document.getElementById("sql-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) runSql();
});
